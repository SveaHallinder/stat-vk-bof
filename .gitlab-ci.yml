# Svea BoF GitLab CI/CD Pipeline
# Staging on commit to main, production on tag svea-bof-vX.Y.Z

stages:
  - build
  - deploy

variables:
  HARBOR_REGISTRY: harbor.eagle.productions
  HARBOR_PROJECT: library
  DOCKER_HOST: unix:///var/run/docker.sock

.harbor-login: &harbor-login
  before_script:
    - echo "${HARBOR_PASSWORD}" | docker login -u "${HARBOR_USERNAME}" --password-stdin ${HARBOR_REGISTRY}
  after_script:
    # Always clear Harbor creds from the runner — even on job failure — so
    # subsequent jobs (potentially from other projects sharing the ai-ops
    # tag) cannot inherit ~/.docker/config.json. `|| true` keeps the job
    # exit status authoritative.
    - docker logout ${HARBOR_REGISTRY} || true

# STAGING
build-backend-staging:
  stage: build
  tags: [ai-ops]
  <<: *harbor-login
  script:
    - docker build -f backend/Dockerfile
        --build-arg BUILD_VERSION=${CI_COMMIT_SHORT_SHA}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:staging-${CI_COMMIT_SHORT_SHA}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:staging-latest .
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:staging-${CI_COMMIT_SHORT_SHA}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:staging-latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"

build-frontend-staging:
  stage: build
  tags: [ai-ops]
  <<: *harbor-login
  script:
    - docker build -f Dockerfile.frontend
        --build-arg BUILD_VERSION=${CI_COMMIT_SHORT_SHA}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:staging-${CI_COMMIT_SHORT_SHA}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:staging-latest .
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:staging-${CI_COMMIT_SHORT_SHA}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:staging-latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"

deploy-staging:
  stage: deploy
  tags: [ai-ops]
  needs: [build-backend-staging, build-frontend-staging]
  script:
    - kubectl -n svea-bof-staging set image deployment/svea-bof-backend svea-bof-backend=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:staging-${CI_COMMIT_SHORT_SHA}
    - kubectl -n svea-bof-staging set image deployment/svea-bof-frontend svea-bof-frontend=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:staging-${CI_COMMIT_SHORT_SHA}
    - kubectl -n svea-bof-staging rollout status deployment/svea-bof-backend --timeout=180s
    - kubectl -n svea-bof-staging rollout status deployment/svea-bof-frontend --timeout=180s
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  environment:
    name: staging
    url: https://bof.statistiksystem.staging.eagle.nu

# PRODUCTION (tag svea-bof-vX.Y.Z)
build-backend-production:
  stage: build
  tags: [ai-ops]
  <<: *harbor-login
  script:
    - VERSION=${CI_COMMIT_TAG#svea-bof-}
    - docker build -f backend/Dockerfile
        --build-arg BUILD_VERSION=${VERSION}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:${VERSION}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:latest .
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:${VERSION}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^svea-bof-v\d+\.\d+\.\d+$/

build-frontend-production:
  stage: build
  tags: [ai-ops]
  <<: *harbor-login
  script:
    - VERSION=${CI_COMMIT_TAG#svea-bof-}
    - docker build -f Dockerfile.frontend
        --build-arg BUILD_VERSION=${VERSION}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:${VERSION}
        -t ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:latest .
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:${VERSION}
    - docker push ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^svea-bof-v\d+\.\d+\.\d+$/

deploy-production:
  stage: deploy
  tags: [ai-ops]
  needs: [build-backend-production, build-frontend-production]
  script:
    - VERSION=${CI_COMMIT_TAG#svea-bof-}
    - kubectl -n svea-bof set image deployment/svea-bof-backend svea-bof-backend=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-backend:${VERSION}
    - kubectl -n svea-bof set image deployment/svea-bof-frontend svea-bof-frontend=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/svea-bof-frontend:${VERSION}
    - kubectl -n svea-bof rollout status deployment/svea-bof-backend --timeout=180s
    - kubectl -n svea-bof rollout status deployment/svea-bof-frontend --timeout=180s
  rules:
    - if: $CI_COMMIT_TAG =~ /^svea-bof-v\d+\.\d+\.\d+$/
  environment:
    name: production
    url: https://bof.statistiksystem.eagle.nu
